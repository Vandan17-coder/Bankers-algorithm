<!DOCTYPE html>
<html>

<head>
<title>Banker's Algorithm</title>
<link rel="stylesheet" href="bankers.css">
</head>

<body>

<div class="wrapper">

<header>

<div>
<h1>Banker's Algorithm</h1>
<p>Deadlock Detection & Avoidance Simulator</p>
</div>

<div>
<button onclick="runBanker()">Run Analysis</button>
<button onclick="location.reload()">Reset</button>
</div>

</header>

<div class="container">

<!-- LEFT SIDE -->

<div>

<div class="card">

<h2>Available Resources</h2>

<div id="available">
<input value="3">
<input value="3">
<input value="2">
</div>

</div>


<div class="card">

<h2>Process State Matrix</h2>

<table id="table">

<tr>
<th>Process</th>
<th colspan="3">Allocation</th>
<th colspan="3">Max</th>
</tr>

<tr>
<td>P0</td>
<td><input value="0"></td>
<td><input value="1"></td>
<td><input value="0"></td>

<td><input value="7"></td>
<td><input value="5"></td>
<td><input value="3"></td>
</tr>

<tr>
<td>P1</td>
<td><input value="2"></td>
<td><input value="0"></td>
<td><input value="0"></td>

<td><input value="3"></td>
<td><input value="2"></td>
<td><input value="2"></td>
</tr>

<tr>
<td>P2</td>
<td><input value="3"></td>
<td><input value="0"></td>
<td><input value="2"></td>

<td><input value="9"></td>
<td><input value="0"></td>
<td><input value="2"></td>
</tr>

<tr>
<td>P3</td>
<td><input value="2"></td>
<td><input value="1"></td>
<td><input value="1"></td>

<td><input value="2"></td>
<td><input value="2"></td>
<td><input value="2"></td>
</tr>

<tr>
<td>P4</td>
<td><input value="0"></td>
<td><input value="0"></td>
<td><input value="2"></td>

<td><input value="4"></td>
<td><input value="3"></td>
<td><input value="3"></td>
</tr>

</table>

</div>

</div>

<!-- RIGHT SIDE -->

<div>

<div class="card">

<h2>Analysis Result</h2>

<div id="status"></div>

<h3>Safe Sequence</h3>
<div id="sequence"></div>

<h3>Execution Steps</h3>
<div id="steps"></div>

</div>

</div>

</div>

</div>

<script src="bankers.js"></script>

</body>
</html>
